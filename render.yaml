services:
  - type: web
    name: partidolink-api
    env: ruby
    region: oregon
    buildCommand: "./backend/bin/render-build.sh"
    startCommand: "cd backend && bundle exec puma -C config/puma.rb"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: partidolink-db
          property: connectionString
      - key: RAILS_ENV
        value: production
      - key: RAILS_MASTER_KEY
        sync: false
      - key: DEVISE_JWT_SECRET_KEY
        generateValue: true
      - key: FRONTEND_URL
        sync: false
      - key: CLOUDINARY_URL
        sync: false

  - type: web
    name: partidolink-frontend
    env: static
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: "./frontend/dist"
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false

databases:
  - name: partidolink-db
    databaseName: partidolink_production
    user: partidolink
    region: oregon
